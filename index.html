<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art A Day</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0c0a;--surface:#161310;--card:#1c1814;--border:#2a2420;
  --text:#e8e0d4;--muted:#6b6058;--soft:#a89880;
  --gold:#c9a050;--rust:#c0522a;--cream:#f0e8d8;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;min-height:100vh;overflow-x:hidden}



header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(14,12,10,0.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{font-family:'Libre Baskerville',serif;font-size:1.1rem;letter-spacing:0.04em;color:var(--cream)}
.logo em{color:var(--gold);font-style:italic}
.hdr-meta{text-align:right}
.hdr-date{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase}
.hdr-count{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--gold);letter-spacing:0.08em;margin-top:2px}

.hero{position:relative;min-height:100svh;display:flex;flex-direction:column;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(40px) brightness(0.15) saturate(0.5);transform:scale(1.1);transition:background-image 1s}
.hero-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:32px 24px 24px;animation:fadeUp 0.6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.today-label{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.today-label::before{content:'';width:24px;height:1px;background:var(--gold)}

.hero-frame{width:100%;max-width:460px;margin:0 auto 28px;position:relative}
.frame-border{position:absolute;inset:-6px;border:1px solid rgba(201,160,80,0.18);pointer-events:none;z-index:3}
.frame-corner{position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid;opacity:0.5}
.frame-corner.tl{top:-6px;left:-6px;border-width:1px 0 0 1px}
.frame-corner.tr{top:-6px;right:-6px;border-width:1px 1px 0 0}
.frame-corner.bl{bottom:-6px;left:-6px;border-width:0 0 1px 1px}
.frame-corner.br{bottom:-6px;right:-6px;border-width:0 1px 1px 0}

.hero-img-wrap{aspect-ratio:4/3;background:#0a0806;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.hero-img{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.8s ease;display:block}
.hero-img.loaded{opacity:1}
.spinner{position:absolute;width:26px;height:26px;border-radius:50%;border:1px solid rgba(201,160,80,0.12);border-top-color:var(--gold);animation:spin 1s linear infinite}
.spinner.hidden{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.hero-era{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--rust);margin-bottom:10px}
.hero-title{font-family:'Libre Baskerville',serif;font-size:clamp(1.5rem,5vw,2.2rem);font-style:italic;line-height:1.12;color:var(--cream);margin-bottom:5px}
.hero-artist{font-size:0.9rem;color:var(--soft);font-weight:300;margin-bottom:22px}
.hero-divider{width:36px;height:1px;background:var(--border);margin-bottom:22px}

.hero-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.meta-block label{display:block;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.meta-block span{font-size:1rem;color:var(--soft);font-weight:300;line-height:1.4}

.hero-history{font-size:1.05rem;line-height:1.85;color:#b0987c;font-weight:300;margin-bottom:18px}
.why-block{padding:16px 18px;border-left:2px solid var(--gold);background:rgba(201,160,80,0.04);margin-bottom:28px}
.why-block h4{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.why-block p{font-size:1rem;line-height:1.75;color:#9a8464;font-style:italic;font-weight:300}

.next-bar{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-top:auto;background:rgba(255,255,255,0.02);border:1px solid var(--border)}
.next-bar-label{font-family:'DM Mono',monospace;font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.next-bar-time{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--rust);letter-spacing:0.04em}
.next-bar-sep{flex:1;height:1px;background:var(--border)}
.next-bar-hint{font-family:'DM Mono',monospace;font-size:0.48rem;color:var(--muted);letter-spacing:0.08em;text-align:right}

.scroll-cue{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;opacity:0.3;animation:bob 2.2s ease-in-out infinite;cursor:pointer;z-index:3}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
.scroll-cue span{font-family:'DM Mono',monospace;font-size:0.43rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft)}
.scroll-cue svg{width:14px;height:14px;stroke:var(--soft);fill:none;stroke-width:1.5}

.collection{padding-bottom:60px;background:var(--bg)}
.era-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:57px;z-index:40;padding:0 8px}
.era-tabs::-webkit-scrollbar{display:none}
.era-tab{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;padding:13px 14px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.era-tab:hover{color:var(--text)}
.era-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pill{font-size:0.44rem;padding:1px 5px;border-radius:8px;background:var(--border);color:var(--muted);transition:all 0.2s}
.era-tab.active .tab-pill{background:var(--gold);color:var(--bg)}

.collection-header{padding:28px 24px 18px;display:flex;align-items:baseline;justify-content:space-between}
.collection-title{font-family:'Libre Baskerville',serif;font-size:1.05rem;font-style:italic;color:var(--cream)}
.collection-sub{font-family:'DM Mono',monospace;font-size:0.48rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}

.empty-state{padding:52px 24px;text-align:center}
.empty-state p{font-family:'DM Mono',monospace;font-size:0.52rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;line-height:2.4}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border)}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:820px){.grid{grid-template-columns:repeat(4,1fr)}}

.card{background:var(--card);cursor:pointer;position:relative;overflow:hidden;transition:background 0.2s}
.card:hover{background:#232018}
.card:hover .card-img{transform:scale(1.05)}
.card-thumb{aspect-ratio:4/3;overflow:hidden;background:#0a0806;display:flex;align-items:center;justify-content:center;position:relative}
.card-img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s ease,transform 0.4s ease}
.card-img.loaded{opacity:1}
.card-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.card-placeholder svg{opacity:0.07;width:26px;height:26px}
.badge-starter{position:absolute;top:7px;left:7px;font-family:'DM Mono',monospace;font-size:0.4rem;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;background:rgba(201,160,80,0.12);border:1px solid rgba(201,160,80,0.25);color:var(--gold)}
.badge-new{position:absolute;top:7px;left:7px;font-family:'DM Mono',monospace;font-size:0.4rem;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;background:rgba(192,82,42,0.15);border:1px solid rgba(192,82,42,0.35);color:var(--rust)}
.card-info{padding:11px 13px 13px}
.card-era{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--rust);margin-bottom:3px}
.card-title{font-family:'Libre Baskerville',serif;font-size:0.95rem;font-style:italic;line-height:1.25;color:var(--cream);margin-bottom:2px}
.card-artist{font-size:0.82rem;color:var(--muted);font-weight:300}

.overlay{position:fixed;inset:0;background:rgba(6,4,2,0.9);z-index:200;display:none;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center;padding:24px}}
.overlay.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:620px;max-height:92svh;overflow-y:auto;position:relative;border-top:1px solid var(--border);animation:slideUp 0.28s ease both}
@media(min-width:600px){.modal{border:1px solid var(--border);animation:fadeScale 0.22s ease both}}
@keyframes slideUp{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeScale{from{transform:scale(0.97);opacity:0}to{transform:scale(1);opacity:1}}
.modal-img-wrap{background:#080604;display:flex;align-items:center;justify-content:center;min-height:180px}
.modal-img{max-width:100%;max-height:300px;object-fit:contain;display:block;opacity:0;transition:opacity 0.5s}
.modal-img.loaded{opacity:1}
.modal-body{padding:22px 20px 26px}
.modal-close{position:sticky;top:0;float:right;margin:10px 10px 0 0;background:rgba(255,255,255,0.05);border:1px solid var(--border);width:30px;height:30px;border-radius:50%;cursor:pointer;color:var(--soft);font-size:0.85rem;display:flex;align-items:center;justify-content:center;z-index:10}
.modal-close:hover{background:rgba(255,255,255,0.1)}
.modal-era{font-family:'DM Mono',monospace;font-size:0.48rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--rust);margin-bottom:7px}
.modal-title{font-family:'Libre Baskerville',serif;font-size:1.4rem;font-style:italic;line-height:1.15;color:var(--cream);margin-bottom:3px}
.modal-artist{font-size:1rem;color:var(--soft);font-weight:300;margin-bottom:18px}
.modal-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.modal-meta label{display:block;font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.modal-meta span{font-size:0.95rem;color:var(--soft);font-weight:300}
.modal-history{font-size:1.05rem;line-height:1.85;color:#b0987c;font-weight:300;margin-bottom:16px}
.modal-why{padding:14px 16px;border-left:2px solid var(--gold);background:rgba(201,160,80,0.04)}
.modal-why h4{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.modal-why p{font-size:1rem;line-height:1.75;color:#9a8464;font-style:italic;font-weight:300}
</style>
</head>
<body>



<header>
  <div class="logo">Art <em>A</em> Day</div>
  <div class="hdr-meta">
    <div class="hdr-date" id="hdrDate"></div>
    <div class="hdr-count" id="hdrCount"></div>
  </div>
</header>

<section class="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-content">
    <div class="today-label">Today's Artwork</div>
    <div class="hero-frame">
      <div class="frame-border"></div>
      <div class="frame-corner tl"></div><div class="frame-corner tr"></div>
      <div class="frame-corner bl"></div><div class="frame-corner br"></div>
      <div class="hero-img-wrap">
        <div class="spinner" id="heroSpinner"></div>
        <img class="hero-img" id="heroImg" alt="" />
      </div>
    </div>
    <div class="hero-era" id="heroEra"></div>
    <h1 class="hero-title" id="heroTitle"></h1>
    <div class="hero-artist" id="heroArtist"></div>
    <div class="hero-divider"></div>
    <div class="hero-meta">
      <div class="meta-block"><label>Year</label><span id="heroYear"></span></div>
      <div class="meta-block"><label>Origin</label><span id="heroOrigin"></span></div>
      <div class="meta-block"><label>Medium</label><span id="heroMedium"></span></div>
      <div class="meta-block"><label>Now at</label><span id="heroLocation"></span></div>
    </div>
    <p class="hero-history" id="heroHistory"></p>
    <div class="why-block"><h4>Why It Matters</h4><p id="heroWhy"></p></div>
    <div class="next-bar">
      <div class="next-bar-label">Next piece in</div>
      <div class="next-bar-time" id="countdown">--:--:--</div>
      <div class="next-bar-sep"></div>
      <div class="next-bar-hint" id="nextHint"></div>
    </div>
  </div>
  <div class="scroll-cue" onclick="document.getElementById('coll').scrollIntoView({behavior:'smooth'})">
    <span>Browse Collection</span>
    <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
  </div>
</section>

<section class="collection" id="coll">
  <div class="era-tabs" id="eraTabs"></div>
  <div id="collBody"></div>
</section>

<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img-wrap"><img class="modal-img" id="mImg" alt="" /></div>
    <div class="modal-body">
      <div class="modal-era" id="mEra"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-artist" id="mArtist"></div>
      <div class="modal-meta">
        <div><label>Year</label><span id="mYear"></span></div>
        <div><label>Origin</label><span id="mOrigin"></span></div>
        <div><label>Medium</label><span id="mMedium"></span></div>
        <div><label>Now at</label><span id="mLocation"></span></div>
      </div>
      <p class="modal-history" id="mHistory"></p>
      <div class="modal-why"><h4>Why It Matters</h4><p id="mWhy"></p></div>
    </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────
const S = { // Starters: 5 per era
  ancient:[
    {t:"Hall of the Bulls",a:"Unknown Paleolithic Artists",y:"c. 17,000 BCE",o:"Lascaux, France",m:"Natural pigments on limestone",l:"Lascaux Cave, France",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Lascaux_painting.jpg/800px-Lascaux_painting.jpg",h:"Deep in a cave in the Dordogne region of France, Paleolithic humans created one of humanity's oldest masterpieces. The Hall of the Bulls features massive aurochs, horses, and deer painted across a vaulted ceiling — discovered by accident in 1940 by four teenagers following their dog.",w:"This is where human storytelling begins. These paintings prove that the urge to create art is as ancient as humanity itself — not a luxury, but a fundamental need."},
    {t:"Death Mask of Tutankhamun",a:"Unknown Egyptian Craftsmen",y:"c. 1323 BCE",o:"Thebes, Egypt",m:"Gold, lapis lazuli, carnelian",l:"Egyptian Museum, Cairo",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/CairoEgMuseumTaaMaskCleaned_edit1.jpg/640px-CairoEgMuseumTaaMaskCleaned_edit1.jpg",h:"Created for the young pharaoh Tutankhamun who died around age 19, this funeral mask weighs 10.23 kg of solid gold. It remained undisturbed for over 3,000 years until Howard Carter's legendary 1922 excavation.",w:"It represents the Egyptian belief in eternal life. The gold was believed to be the flesh of the gods — wearing it, Tutankhamun became divine."},
    {t:"Discobolus",a:"Myron (Roman marble copy)",y:"c. 450 BCE",o:"Ancient Greece",m:"Marble (copy of lost bronze)",l:"Museo Nazionale Romano, Rome",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Discobolus_in_National_Roman_Museum.jpg/480px-Discobolus_in_National_Roman_Museum.jpg",h:"The original bronze by Myron is lost; we know it only through Roman marble copies. It captures an athlete frozen at the apex of a discus throw — a moment of perfect dynamic tension.",w:"It shattered a 2,000-year convention of depicting figures in static poses, proving that art could capture a single fleeting, charged moment."},
    {t:"Venus of Willendorf",a:"Unknown Paleolithic Artist",y:"c. 25,000 BCE",o:"Willendorf, Austria",m:"Oolitic limestone, ochre",l:"Naturhistorisches Museum, Vienna",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Venus_von_Willendorf_01.jpg/360px-Venus_von_Willendorf_01.jpg",h:"This tiny 11cm figurine is one of the earliest known works of figurative art. The exaggerated form suggests associations with fertility or the female body as a symbol of abundance and survival.",w:"It tells us that abstract symbolic thinking existed 25,000 years before writing. Art, it turns out, is older than civilization itself."},
    {t:"Bust of Nefertiti",a:"Thutmose (attributed)",y:"c. 1345 BCE",o:"Amarna, Egypt",m:"Painted limestone, gypsum stucco",l:"Neues Museum, Berlin",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Nofretete_Neues_Museum.jpg/480px-Nofretete_Neues_Museum.jpg",h:"Discovered in 1912 in the sculptor Thutmose's workshop in Amarna, this painted bust of Queen Nefertiti is one of the most famous works of ancient art — likely a sculptor's model never meant for public display.",w:"Its asymmetry (one eye left blank) makes it eerily modern. It has become a symbol of ancient Egypt and a focal point in ongoing debates about cultural heritage repatriation."},
  ],
  medieval:[
    {t:"Justinian Mosaic",a:"Unknown Byzantine Artists",y:"c. 547 CE",o:"Ravenna, Italy",m:"Glass tesserae mosaic",l:"Basilica of San Vitale, Ravenna",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Meister_von_San_Vitale_in_Ravenna.jpg/800px-Meister_von_San_Vitale_in_Ravenna.jpg",h:"Emperor Justinian I had himself immortalized in this apse mosaic. He is shown holding a golden paten, surrounded by clergy and soldiers, feet hovering above the ground to suggest divine authority.",w:"The mosaic established visual conventions shaping Christian art for a millennium: gold backgrounds for heaven, frontal hieratic gazes, and the Emperor as God's earthly representative."},
    {t:"Ognissanti Madonna",a:"Giotto di Bondone",y:"c. 1310",o:"Florence, Italy",m:"Tempera and gold on panel",l:"Uffizi Gallery, Florence",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Giotto_di_Bondone_-_Ognissanti_Madonna_-_Google_Art_Project.jpg/600px-Giotto_di_Bondone_-_Ognissanti_Madonna_-_Google_Art_Project.jpg",h:"When Byzantine art kept figures flat and stylized, Giotto introduced weight, volume, and actual space. Mary sits on a throne that recedes into depth; the angels look at each other across genuine three-dimensional space.",w:"Giotto broke a thousand years of artistic convention. He is the father of Western painting and the first decisive step toward the Renaissance."},
    {t:"Bayeux Tapestry (detail)",a:"Unknown Norman or English Embroiderers",y:"c. 1070s CE",o:"Normandy, France",m:"Wool embroidery on linen",l:"Musée de la Tapisserie, Bayeux",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Bayeux_Tapestry_WP_version.jpg/1200px-Bayeux_Tapestry_WP_version.jpg",h:"This 70-metre embroidered strip narrates the Norman Conquest of England in 1066. It is the world's oldest surviving sequential narrative artwork — a story told in scenes, like a medieval comic strip.",w:"It is simultaneously political propaganda, military manual, and work of art. More than 900 years old, it remains the most vivid visual document of the medieval world."},
    {t:"Wilton Diptych",a:"Unknown English or French Painter",y:"c. 1395–1399",o:"England or France",m:"Egg tempera and gold leaf on oak",l:"National Gallery, London",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Wilton_Diptych.jpg/800px-Wilton_Diptych.jpg",h:"This small portable altarpiece shows King Richard II of England kneeling before the Virgin Mary and Christ Child, surrounded by angels wearing his personal badge of the white hart.",w:"Its exquisite detail and intimate scale reveal that medieval art was not just monumental — it was also deeply personal, made for private prayer and contemplation."},
    {t:"Très Riches Heures du Duc de Berry",a:"Limbourg Brothers",y:"c. 1412–1416",o:"France",m:"Tempera and gold on vellum",l:"Musée Condé, Chantilly",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Les_Tr%C3%A8s_Riches_Heures_du_duc_de_Berry_janvier.jpg/480px-Les_Tr%C3%A8s_Riches_Heures_du_duc_de_Berry_janvier.jpg",h:"Commissioned by the Duke of Berry, this illuminated manuscript is the finest example of International Gothic style. The calendar pages show seasonal peasant and noble life with extraordinary naturalistic detail.",w:"It bridged medieval symbolism and Renaissance realism. The Limbourg brothers died with the Duke in 1416, likely from plague, leaving it unfinished — which makes it all the more poignant."},
  ],
  renaissance:[
    {t:"Mona Lisa",a:"Leonardo da Vinci",y:"1503–1519",o:"Florence, Italy",m:"Oil on poplar panel",l:"Louvre Museum, Paris",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg/600px-Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg",h:"Believed to depict Lisa Gherardini, wife of Florentine merchant Francesco del Giocondo, Leonardo worked on this portrait for years and never delivered it. His revolutionary sfumato technique creates the famously ambiguous, atmospheric quality.",w:"It represents the summit of Renaissance naturalism. Leonardo treated the human face as a landscape of psychological depth — something no painter had attempted with such mastery."},
    {t:"The Birth of Venus",a:"Sandro Botticelli",y:"c. 1484–1486",o:"Florence, Italy",m:"Tempera on canvas",l:"Uffizi Gallery, Florence",i:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg/1200px-Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg",h:"Commissioned by the Medici family, Botticelli painted the goddess Venus emerging from the sea as a full-grown woman. It was the first large-scale mythological nude of the Renaissance.",w:"It signaled the Renaissance's rediscovery of Classical antiquity and the legitimacy of beauty as a subject in itself. Venus is not a sinner — she is an ideal to be celebrated."},

// ── LAUNCH CONFIG ─────────────────────────────────────────────────
const LAUNCH = new Date('2025-03-01');
const ERAS = ['all','ancient','medieval','renaissance','baroque','modern','contemporary'];
const ERA_LABEL = {all:'All',ancient:'Ancient',medieval:'Medieval',renaissance:'Renaissance',baroque:'Baroque',modern:'Modern',contemporary:'Contemporary'};

const now = new Date();
const dayN = Math.max(0, Math.floor((now - LAUNCH) / 86400000));
const unlockedN = Math.min(dayN, DAILY.length);

// Use actual calendar day so artwork always rotates daily,
// cycling through the list indefinitely.
const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
const todayIdx = dayOfYear % DAILY.length;
const TODAY = {...DAILY[todayIdx], era: DAILY[todayIdx].era};

// Build collection: all starters + daily unlocks EXCEPT today
function buildColl() {
  const c = {};
  ERAS.filter(e=>e!=='all').forEach(e => { c[e] = S[e].map(a=>({...a,era:e,starter:true})); });
  for (let i = 0; i < unlockedN - 1; i++) {
    const d = DAILY[i];
    if (c[d.era]) c[d.era].push({...d,starter:false});
  }
  return c;
}
const COLL = buildColl();
const totalPieces = Object.values(COLL).reduce((s,a)=>s+a.length,0);

// ── HEADER ────────────────────────────────────────────────────────
document.getElementById('hdrDate').textContent =
  now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}).toUpperCase();
document.getElementById('hdrCount').textContent =
  `${totalPieces} piece${totalPieces!==1?'s':''} in collection`;

// ── IMAGE LOADER ──────────────────────────────────────────────────
// Uses Wikipedia API with the exact Commons filename for each artwork.
// Falls back to Wikimedia Special:FilePath redirect as a second attempt.
const cache = {};

async function loadImg(url, el, spinner) {
  if (!url) return;
  if (cache[url]) {
    el.src = cache[url];
    el.classList.add('loaded');
    if (spinner) spinner.classList.add('hidden');
    return;
  }

  // Step 1: extract clean filename (strip path + any leading NNNpx- thumbnail prefix)
  let raw = url.split('/').pop();
  raw = decodeURIComponent(raw).replace(/^\d+px-/, '');

  // Step 2: try Wikipedia imageinfo API (CORS-safe, returns CDN thumb URL)
  const apiUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(raw)}&prop=imageinfo&iiprop=url&iiurlwidth=800&format=json&origin=*`;
  try {
    const res = await fetch(apiUrl);
    const data = await res.json();
    const page = Object.values(data?.query?.pages || {})[0];
    const thumb = page?.imageinfo?.[0]?.thumburl || page?.imageinfo?.[0]?.url;
    if (thumb) {
      cache[url] = thumb;
      el.src = thumb;
      el.onload = () => { el.classList.add('loaded'); if (spinner) spinner.classList.add('hidden'); };
      el.onerror = () => tryFilePath(raw, url, el, spinner);
      return;
    }
  } catch(e) {}

  // Step 3: try Wikimedia Commons Special:FilePath as redirect
  tryFilePath(raw, url, el, spinner);
}

function tryFilePath(filename, origUrl, el, spinner) {
  // Special:FilePath redirects to the real CDN URL — works cross-origin
  const src = `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(filename)}?width=800`;
  el.src = src;
  el.onload = () => {
    cache[origUrl] = src;
    el.classList.add('loaded');
    if (spinner) spinner.classList.add('hidden');
  };
  el.onerror = () => {
    // Final fallback: bare direct URL
    el.src = origUrl;
    el.onload = () => { el.classList.add('loaded'); if (spinner) spinner.classList.add('hidden'); };
    el.onerror = () => { if (spinner) spinner.classList.add('hidden'); };
  };
}

// ── HERO ──────────────────────────────────────────────────────────
const hi = document.getElementById('heroImg');
const hs = document.getElementById('heroSpinner');
document.getElementById('heroEra').textContent = ERA_LABEL[TODAY.era]||TODAY.era;
document.getElementById('heroTitle').textContent = TODAY.t;
document.getElementById('heroArtist').textContent = TODAY.a;
document.getElementById('heroYear').textContent = TODAY.y;
document.getElementById('heroOrigin').textContent = TODAY.o;
document.getElementById('heroMedium').textContent = TODAY.m;
document.getElementById('heroLocation').textContent = TODAY.l;
document.getElementById('heroHistory').textContent = TODAY.h;
document.getElementById('heroWhy').textContent = TODAY.w;
hi.onload = ()=>{ hi.classList.add('loaded'); hs.classList.add('hidden'); document.getElementById('heroBg').style.backgroundImage=`url(${hi.src})`; };
loadImg(TODAY.i, hi, hs);

const rem = DAILY.length - (dayN+1);
document.getElementById('nextHint').textContent = rem>0 ? `${rem} more to come` : 'Full collection unlocked!';

// ── COUNTDOWN ────────────────────────────────────────────────────
function tick(){
  const t=new Date(); t.setDate(t.getDate()+1); t.setHours(0,0,0,0);
  const d=t-new Date();
  const pad=n=>String(Math.floor(n)).padStart(2,'0');
  document.getElementById('countdown').textContent=`${pad(d/3600000)}:${pad((d%3600000)/60000)}:${pad((d%60000)/1000)}`;
}
tick(); setInterval(tick,1000);

// ── TABS ──────────────────────────────────────────────────────────
let activeEra='all';
function countEra(e){ return e==='all'?Object.values(COLL).reduce((s,a)=>s+a.length,0):(COLL[e]||[]).length; }
function buildTabs(){
  const nav=document.getElementById('eraTabs'); nav.innerHTML='';
  ERAS.forEach(e=>{
    const b=document.createElement('button');
    b.className='era-tab'+(e===activeEra?' active':'');
    b.innerHTML=`${ERA_LABEL[e]} <span class="tab-pill">${countEra(e)}</span>`;
    b.onclick=()=>{activeEra=e;buildTabs();renderColl();};
    nav.appendChild(b);
  });
}

// ── COLLECTION ────────────────────────────────────────────────────
function renderColl(){
  const body=document.getElementById('collBody'); body.innerHTML='';
  const pieces = activeEra==='all'
    ? Object.entries(COLL).flatMap(([e,arr])=>arr.map(a=>({...a,era:e})))
    : (COLL[activeEra]||[]).map(a=>({...a,era:activeEra}));

  const hdr=document.createElement('div'); hdr.className='collection-header';
  hdr.innerHTML=`<div class="collection-title">Collection${activeEra!=='all'?' — '+ERA_LABEL[activeEra]:''}</div><div class="collection-sub">${pieces.length} piece${pieces.length!==1?'s':''}</div>`;
  body.appendChild(hdr);

  if(!pieces.length){
    const e=document.createElement('div'); e.className='empty-state';
    e.innerHTML='<p>No pieces yet in this era.<br>Come back as your collection grows daily.</p>';
    body.appendChild(e); return;
  }

  const grid=document.createElement('div'); grid.className='grid';
  pieces.forEach(art=>{
    const card=document.createElement('div'); card.className='card';
    const badge=art.starter?'<div class="badge-starter">Starter</div>':'<div class="badge-new">Unlocked</div>';
    card.innerHTML=`<div class="card-thumb"><div class="card-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>${badge}<img class="card-img" alt="${art.t}"/></div><div class="card-info"><div class="card-era">${ERA_LABEL[art.era]||art.era}</div><div class="card-title">${art.t}</div><div class="card-artist">${art.a}</div></div>`;
    card.onclick=()=>openModal(art);
    grid.appendChild(card);
    loadImg(art.i, card.querySelector('.card-img'), null);
  });
  body.appendChild(grid);
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(art){
  document.getElementById('mEra').textContent=ERA_LABEL[art.era]||art.era;
  document.getElementById('mTitle').textContent=art.t;
  document.getElementById('mArtist').textContent=art.a;
  document.getElementById('mYear').textContent=art.y;
  document.getElementById('mOrigin').textContent=art.o;
  document.getElementById('mMedium').textContent=art.m;
  document.getElementById('mLocation').textContent=art.l;
  document.getElementById('mHistory').textContent=art.h;
  document.getElementById('mWhy').textContent=art.w;
  const mi=document.getElementById('mImg'); mi.src=''; mi.classList.remove('loaded');
  loadImg(art.i,mi,null);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }
function handleOverlay(e){ if(e.target===document.getElementById('overlay'))closeModal(); }

// ── INIT ──────────────────────────────────────────────────────────
buildTabs();
renderColl();
</script>
